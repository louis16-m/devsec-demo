<h2>Login</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    <button type="submit">Login</button>
</form>
<p><a href="{% url 'louis16_m:password_reset' %}">Forgot your password?</a></p>
<p>Need an account? <a href="{% url 'louis16_m:register' %}">Register here</a></p>
